  <style>
    * {

      padding: 0;
      box-sizing: border-box;

    body {
      font-family: 'Rubik', sans-serif;

      line-height: 1.4;

      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: rgba(15, 32, 39, 0.75);
      backdrop-filter: blur(6px);
      padding: 2rem 1rem 1.5rem;

      color: #66fcf1;
      position: sticky;
      top: 0;
      z-index: 1000;

      text-align: center;

      margin: auto;
    }
    h2 {

      color: #66fcf1;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #66fcf1;
    }
    p {
      font-size: 1.25rem;
      margin-bottom: 2rem;
    }
    a.button {
      background-color: #66fcf1;
      color: #0f2027;
      text-decoration: none;
      padding: 0.75rem 2rem;
      font-weight: 700;
      border-radius: 30px;
      box-shadow: 0 0 15px #66fcf1;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    a.button:hover {
      background-color: #52d8d8;
      color: #fff;
    }
    footer {
      text-align: center;
      padding: 1.25rem;
      background: #0b0c10;
      font-size: 0.8rem;
      color: #66fcf1;
