<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | gennesis</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.18);
      --border-color: rgba(255, 255, 255, 0.3);
      --shadow: rgba(0, 0, 0, 0.15);
      --text-color: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: url(assets/frutiger-aero_background.jpg) no-repeat center center fixed;
      background-size: cover;
      color: var(--text-color);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1rem;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px var(--shadow);
      border-bottom: 1px solid var(--border-color);
    }

    header h1 {
      font-size: 3rem;
      color: white;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      text-align: center;
    }

    nav {
      margin-top: 1rem;
    }

    nav a {
      color: white;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a:hover {
      text-shadow: 0 0 8px white;
    }

    main {
      padding: 2rem;
      max-width: 1100px;
      margin: 2rem auto;
      width: 100%;
    }

    section {
      border: 2px solid var(--border-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 2rem;
      border-radius: 1.75rem;
      box-shadow: 0 6px 20px var(--shadow);
      transition: transform 0.3s ease;
      margin-bottom: 2rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    }

    section:hover {
      transition: all 1s ease;
      transform: translateY(-10px);
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: white;
      border-bottom: 2px solid white;
      display: inline-block;
    }

    .notfound {
      text-align: center;
      padding: 2rem;
    }

    .notfound h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #ffffff;
      text-shadow: 0 0 14px rgba(255,204,0,0.2);
    }

    .notfound p {
      margin-bottom: 1.25rem;
      color: #eee;
    }

    .btn-home {
      display: inline-block;
      padding: 0.6rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.25s ease;
    }

    .btn-home:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    footer {
      text-align: center;
      padding: 2rem;
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-color);
      font-size: 0.9rem;
      margin-top: auto;
    }

    footer .social-icons {
      margin-bottom: 1rem;
    }

    footer .social-icons a {
      display: inline-block;
      margin: 0 0.8rem;
      transition: transform 0.3s ease;
    }

    footer .social-icons a img {
      width: 32px;
      height: 32px;
      filter: brightness(1);
      transition: all 0.3s ease;
    }

    footer .social-icons a:hover img {
      filter: brightness(1) drop-shadow(0 0 4px #ffa600);
      transform: scale(2);
    }

    a {
      color: white;
    }

    a:hover {
      text-shadow: 0 0 4px white;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2.2rem;
      }

      main {
        padding: 1.5rem;
      }

      .notfound h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="https://www.gennesis.cc">gennesis.cc</a></h1>
    <nav>
      <a href="/">Home</a>
    </nav>
  </header>

  <main>
    <section class="notfound">
      <h1>404 — Page Not Found</h1>
      <p>Looks like the page you're trying to reach doesn't exist or has been moved.</p>
      <p>Try returning home or using the navigation above.</p>
      <a class="btn-home" href="https://www.gennesis.cc" role="button">Go to Home</a>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://discord.com/users/1244639564396757115" target="_blank" aria-label="Discord Profile">
        <img src="assets/discord.png" alt="Discord Logo" />
      </a>
      <a href="https://open.spotify.com/user/31b37pzsrkyu77frpvwxkg36eloe?si=97cca9bcd2604faa" target="_blank" aria-label="Spotify Profile">
        <img src="assets/spotify.png" alt="Spotify Logo" />
      </a>
      <a href="https://github.com/g3nn3sis" target="_blank" aria-label="Github Profile">
        <img src="assets/github-logo.png" alt="Github Logo" />
      </a>
      <a href="https://steamcommunity.com/id/g3nn3sis" target="_blank" aria-label="Steam Profile">
        <img src="assets/steam.png" alt="Steam" />
      </a>
    </div>
    <p>&copy; 2025 gennesis.cc — Please don't steal.</p>
  </footer>
</body>
</html>
