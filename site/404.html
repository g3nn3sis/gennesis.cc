<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found | gennesis.cc</title>
  <style>
    :root {
      --bg-light: linear-gradient(135deg, #e0eafc, #cfdef3);
      --text-light: #333;
      --bg-dark: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --text-dark: #fff;
      --btn-bg-light: rgba(0, 0, 0, 0.08);
      --btn-bg-dark: rgba(255, 255, 255, 0.2);
      --btn-hover-light: rgba(0, 0, 0, 0.15);
      --btn-hover-dark: rgba(255, 255, 255, 0.3);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-dark);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      transition: background 0.5s ease, color 0.5s ease;
      user-select: none;
      padding: 2rem;
      position: relative;
    }

    body.light {
      background: var(--bg-light);
      color: var(--text-light);
    }

    img.logo {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      user-select: none;
    }

    h1 {
      font-size: 4rem;
      margin: 0.2em 0 0.4em;
    }

    p {
      font-size: 1.25rem;
      margin: 0 0 1.5em;
      user-select: text;
    }

    a.home-link {
      display: inline-block;
      background: var(--btn-bg-dark);
      color: var(--text-dark);
      padding: 0.7em 2em;
      border-radius: 25px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s ease;
      user-select: none;
    }

    body.light a.home-link {
      background: var(--btn-bg-light);
      color: var(--text-light);
    }

    a.home-link:hover,
    a.home-link:focus {
      background: var(--btn-hover-dark);
      outline: none;
    }

    body.light a.home-link:hover,
    body.light a.home-link:focus {
      background: var(--btn-hover-light);
    }

    .toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--btn-bg-dark);
      border: none;
      padding: 0.5em 1em;
      border-radius: 20px;
      color: var(--text-dark);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
      user-select: none;
    }
    body.light .toggle-btn {
      background: var(--btn-bg-light);
      color: var(--text-light);
    }
    .toggle-btn:hover,
    .toggle-btn:focus {
      background: var(--btn-hover-dark);
      outline: none;
    }
    body.light .toggle-btn:hover,
    body.light .toggle-btn:focus {
      background: var(--btn-hover-light);
    }
  </style>
</head>
<body>
  <button class="toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">Toggle Theme</button>

  <h1>404!</h1>
  <p>Oops! The page you're looking for cannot be found.</p>
  <a href="https://home.gennesis.cc" class="home-link" role="button">Go to Homepage</a>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light');
      if(document.body.classList.contains('light')) {
        localStorage.setItem('theme', 'light');
      } else {
        localStorage.setItem('theme', 'dark');
      }
    }

    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }
  </script>
</body>
</html>
