<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gennesis.cc</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-start: #052005;       /* Very dark forest green */
      --bg-end: #144214;         /* Darker medium forest green */
      --accent: #357a38;         /* Deep forest green accent */
      --text-light: #b8d8b8;     /* Softer, muted light green text */
      --text-muted: #8a9a8a;     /* Muted gray-green text */
      --button-bg: #102810;      /* Very dark green button bg */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: linear-gradient(to bottom right, var(--bg-start), var(--bg-end));
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(5, 32, 5, 0.85);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent);
    }

    nav {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    nav a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .signup {
      background: var(--accent);
      color: #d9f1d9;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    .signup:hover {
      background: #4a9651;
      color: #d9f1d9;
    }

    .hero {
      text-align: center;
      padding: 6rem 2rem 4rem;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-light);
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    .claim-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: var(--button-bg);
      border-radius: 8px;
      padding: 0 0.75rem;
    }

    .input-wrapper span {
      color: var(--text-light);
      font-weight: 600;
      white-space: nowrap;
      margin-top: 3.55px;
      margin-right: 2px;
      font-size: 0.9rem;

      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .input-wrapper input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-light);
      font-size: 1rem;
      padding: 0.75rem 0;
      width: 180px;
      transition: color 0.3s;
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .input-wrapper input:hover,
    .input-wrapper input:focus {
      color: var(--text-light);
    }

    .input-wrapper input:hover::placeholder,
    .input-wrapper input:focus::placeholder {
      color: var(--text-muted);
    }

    .claim-box button {
      background: var(--accent);
      color: #d9f1d9;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .claim-box button:hover {
      background: #4a9651;
    }

    .mockups {
      display: flex;
      justify-content: center;
      margin-top: 4rem;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .mockups img {
      width: 300px;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(74, 150, 81, 0.3);
      transform: rotate(-3deg);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">gennesis.cc</div>
    <nav>
      <a href="#">Help Center</a>
      <a href="#">Discord</a>
      <a href="#">Pricing</a>
      <a href="#">Login</a>
      <a href="#" class="signup">Sign Up Free</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Everything you want, right here.</h1>
    <p>gennesis.cc is your place for sleek, nice looking, and clean, customizable sites. Everything you need — right here.</p>

    <div class="claim-box">
      <div class="input-wrapper">
        <span>gennesis.cc/</span>
        <input type="text" id="chosen_username" placeholder="username" />
      </div>
      <button>Claim Now</button>
    </div>
  </section>

  <section class="mockups">
    <img src="https://placehold.co/300x200/052005/357a38?text=.gg/gennesis-cc" alt="Discord Link" />
    <img src="https://placehold.co/300x200/052005/357a38?text=Profile+Card" alt="Mockup 2" />
  </section>

  <footer>
    &copy; 2025 gennesis.cc — All rights reserved.
  </footer>
</body>
</html>
<script>
  document.querySelector(".claim-box button").addEventListener("click", async () => {
    const slug = document.getElementById("chosen_username").value.trim();

    if (!slug) return alert("You need To Enter a Username!");

    const res = await fetch("/api/claim", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slug })
    });

    const data = await res.json();

    if (res.ok) {
      alert("Success! Your link: https://gennesis.cc/" + slug);
    } else {
      alert("Error: " + data.error);
    }
  });
</script>
