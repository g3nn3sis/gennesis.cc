<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gennesis | dfmna</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.18);
      --border-color: rgba(255, 255, 255, 0.3);
      --shadow: rgba(0, 0, 0, 0.15);
      --text-color: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: url(assets/street_background.png) no-repeat center center fixed;
      background-size: cover;
      color: var(--text-color);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1rem;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px var(--shadow);
      border-bottom: 1px solid var(--border-color);
    }

    header h1 {
      font-size: 3rem;
      color: white;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      text-align: center;
    }

    nav {
      margin-top: 1rem;
    }

    nav a {
      color: white;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a:hover {
      text-shadow: 0 0 8px white;
    }

    main {
      padding: 2rem;
      max-width: 1100px;
    }

    .about-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .about-left, .about-right {
      flex: 1;
      min-width: 280px;
    }

    section {
      border: 2px solid var(--border-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 2rem;
      border-radius: 1.75rem;
      box-shadow: 0 6px 20px var(--shadow);
      transition: transform 0.3s ease;
      margin-bottom: 2rem;
    }

    section:hover {
      transition: all 1s ease;
      transform: translateY(-30px);
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: white;
      border-bottom: 2px solid white;
      display: inline-block;
    }

    .languages {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .lang {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .lang:hover {
      transform: scale(1.1);
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(255, 255, 255, 0.3);
    }

    .project-card {
      border-left: 5px solid rgba(255, 255, 255, 0.075);
      padding: 1rem 1.2rem;
      border-radius: 1rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      margin-bottom: 0.8rem;
    }

    .project-card:hover {
      transform: scale(1.05);
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(255, 255, 255, 0.3);
    }

    footer {
      text-align: center;
      padding: 2rem;
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    footer .social-icons {
      margin-bottom: 1rem;
    }

    footer .social-icons a {
      display: inline-block;
      margin: 0 0.8rem;
      transition: transform 0.3s ease;
    }

    footer .social-icons a img {
      width: 32px;
      height: 32px;
      filter: brightness(1);
      transition: all 0.3s ease;
    }

    footer .social-icons a:hover img {
      filter: brightness(1) drop-shadow(0 0 4px #ffa600);
      transform: scale(2);
    }

    .spotifyembed :hover {
      transition: all 0.3s ease-in-out;
      transform: scale(1.05);
    }

    a {
      color: white;
    }

    a:hover {
      text-shadow: 0 0 4px white;
    }

    @media (max-width: 768px) {
      .about-container {
        flex-direction: column;
      }

      header h1 {
        font-size: 2.2rem;
      }

      main {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="https://www.gennesis.cc">gennesis.cc</a></h1>
    <nav>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
    </nav>
  </header>
  <main>
	<section id="leftpanel">
    <div class="about-container">
      <section class="about-left" id="about">
        <h2>About</h2>
        <p>hello, i am gennesis</p>
        <p>____________</p>
        <br>
        <h4>Learning</h4>
        <div class="languages">
          <div class="lang">C#</div>
          <div class="lang">Python</div>
          <div class="lang">JavaScript</div>
        </div>
      </section>
      <section class="about-right">
        <h2>Song Pick</h2>
        <div class="spotifyembed">
          <iframe style="border-radius:24px" src="https://open.spotify.com/embed/track/2kRFrWaLWiKq48YYVdGcm8?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </section>
    </div>
    <section id="quotecontainer">
      <h2>Daily Quote</h2>
      <div id="quote"></div>
    </section>
    <section id="projects">
      <h2>Projects</h2>
      <div id="github-projects"></div>
    </section>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://discord.com/users/1244639564396757115" target="_blank" aria-label="Discord Profile">
        <img src="assets/discord.png" alt="Discord Logo" />
      </a>
      <a href="https://open.spotify.com/user/31b37pzsrkyu77frpvwxkg36eloe?si=97cca9bcd2604faa" target="_blank" aria-label="Spotify Profile">
        <img src="assets/spotify.png" alt="Spotify Logo" />
      </a>
      <a href="https://github.com/g3nn3sis" target="_blank" aria-label="Github Profile">
        <img src="assets/github-logo.png" alt="Github Logo" />
      </a>
      <a href="https://steamcommunity.com/id/g3nn3sis" target="_blank" aria-label="Steam Profile">
        <img src="assets/steam.png" alt="Steam" />
      </a>
    </div>
    <p>&copy; 2025 gennesis.cc — Please don't steal.</p>
  </footer>

  <script>
  fetch('https://api.github.com/users/g3nn3sis/repos?sort=updated&per_page=6')
    .then(response => response.json())
    .then(repos => {
      const container = document.getElementById("github-projects");
      repos.forEach(repo => {
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
          <h3>${repo.name}</h3>
          <p>${repo.language ? repo.language : "Unknown Language."}</p>
        `;
        container.appendChild(card);
      });
    })
    .catch(error => {
      console.error("Error fetching GitHub projects:", error);
    });
  fetch('https://api.gennesis.cc/api/daily_quote')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById("quote");
      const quote = data.motd

      const card = document.createElement("div");
      card.className = "quote";
      card.innerHTML = `<p>${quote}</p>`;

      container.appendChild(card);
    })
    .catch(error => {
      console.error("Error fetching quote:", error);
      const container = document.getElementById("quote");
      container.innerHTML = `<p>Error Loading Quote!</p>`;
    });
</script>

</body>
</html>
