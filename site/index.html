<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gennesis | Dfmna.</title>
    <link href="https://fonts.googleapis.com/css2?family=Retro+Gaming&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="home-theme" onload="initMedia()">
    <div id="start-screen">
        <div id="start-text"></div>
    </div>
    <div class="container">
        <video id="background" autoplay loop muted playsinline webkit-playsinline>
            <source src="assets/background.mp4" type="video/mp4">
        </video>
        <div id="profile-block">
            <div class="profile-header">
                <div class="profile-container">
                    <img src="assets/pfp.png" alt="Profile" class="profile-picture">
                </div>
                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name">@gennesis | @dfmna</div>
                        <div class="badge-box">
                            <div class="badge-box-inner">
                                <div class="badge-group">
                                    <div class="badge-container">
                                        <img src="https://cdn.discordapp.com/emojis/1062896266725572730.gif?size=96&animated=true" alt="Verified Coolio!" class="badge">
                                        <span class="tooltip">Verified Coolio!</span>
                                    </div>
                                    <div class="badge-container">
                                        <img src="assets/discord_dev.png" alt="Discord Developer!" class="badge">
                                        <span class="tooltip">Discord Developer!</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="profile-bio"></div>
                </div>
            </div>

            <div class="bio-separator"></div>
            <div class="profile-footer">
                <div class="social-links">
                    <a href="https://github.com/g3nn3sis" target="_blank">
                        <img src="assets/white_github_logo.png" alt="GitHub" class="social-icon">
                    </a>
                    <a href="https://discord.com/users/1169004167663194235" target="_blank">
                        <img src="assets/white_discord_logo.png" alt="GitHub" class="social-icon">
                    </a>
                </div>


                <div class="visitor-counter">
                    <svg class="visitor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <span id="visitor-count">0</span>
                    <span class="tooltip">Profile Views</span>
                </div>
            </div>
        </div>

        <div class="top-controls">
            <div class="volume-control">
                <svg id="volume-icon" class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                </svg>
                <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
        </div>
    </div>

    <audio id="background-music" loop>
        <source src="assets/background_music.mp3" type="audio/mp3">
    </audio>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>
</html>
